<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Aplifumi — Sistema de Gestión Operativa y Financiera. Administra ingresos y gastos de tu empresa de servicios.">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aplifumi — Gestión Financieraopera</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- TailwindCSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="font-sans antialiased">
  <div class="flex min-h-screen">
    <!-- ═══════════════════════════════════════════ -->
    <!-- LEFT SIDEBAR NAVIGATION                     -->
    <!-- ═══════════════════════════════════════════ -->
    <aside id="sidebar-nav" class="w-64 flex-shrink-0 flex flex-col justify-between border-r" style="background: var(--surface-primary); border-color: var(--surface-border)">
      <div class="p-4 space-y-6">
        <!-- Logo & Title -->
        <div class="flex items-center gap-2.5 px-2">
          <div class="w-8 h-8 rounded-lg overflow-hidden flex items-center justify-center flex-shrink-0 bg-white">
            <img src="logo.jpg" alt="Raggio Fumigaciones Logo" class="w-full h-full object-cover">
          </div>
          <h1 class="text-lg font-bold tracking-tight" style="color: var(--text-primary)">Aplifumi</h1>
        </div>

        <!-- Links -->
        <nav class="space-y-1">
          <!-- Dashboard -->
          <a class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="dashboard" aria-label="Dashboard">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Inicio</span>
          </a>

          <!-- Cuenta Corriente -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="ctacte" aria-label="Cuenta Corriente">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 8h6m-5 0a3 3 0 110 6H9l3 3m-3-6h6m6 1a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Cta. Corriente</span>
          </a>

          <!-- Clientes -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="clientes" aria-label="Administrar Clientes">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Clientes</span>
          </a>

          <!-- Proveedores -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="proveedores" aria-label="Administrar Proveedores">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <span>Proveedores</span>
          </a>

          <!-- Ingresos -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="ingresos" aria-label="Registrar Ingreso">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
            </svg>
            <span>Ingresos</span>
          </a>

          <!-- Gastos -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="gastos" aria-label="Registrar Gasto">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m0 0l7-7m-7 7l-7-7"/>
            </svg>
            <span>Gastos</span>
          </a>

          <!-- Historial -->
          <a class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all cursor-pointer font-medium text-sm" data-route="historial" aria-label="Ver Historial">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Historial</span>
          </a>
        </nav>
      </div>

      <!-- Action buttons bottom of sidebar -->
      <div class="p-4 border-t space-y-2" style="border-color: var(--surface-border)">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="w-full h-10 rounded-xl flex items-center justify-center gap-2 transition-all hover:scale-102 active:scale-98" style="background: var(--surface-secondary); color: var(--text-secondary)" aria-label="Cambiar tema">
          <svg id="theme-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
          </svg>
          <span class="text-xs font-semibold">Cambiar Modo</span>
        </button>

        <!-- Logout -->
        <button onclick="Login.logout()" class="w-full h-10 rounded-xl flex items-center justify-center gap-2 transition-all hover:scale-102 active:scale-98 bg-rose-950/20 hover:bg-rose-950/40 text-rose-500" aria-label="Cerrar sesión">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          <span class="text-xs font-semibold">Cerrar Sesión</span>
        </button>
      </div>
    </aside>

    <!-- ═══════════════════════════════════════════ -->
    <!-- MAIN CONTENT AREA                           -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Main Content Container -->
      <main id="main-content" class="flex-1 p-6 md:p-8 max-w-4xl w-full mx-auto">
        <!-- Contenido dinámico renderizado por el router -->
      </main>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOAST CONTAINER                             -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LOADING OVERLAY                             -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="loading-overlay" class="hidden"></div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SCRIPTS (orden de dependencia)              -->
  <!-- ═══════════════════════════════════════════ -->
  <script src="components.js"></script>
  <script src="api.js"></script>
  <script src="exportar.js"></script>
  <script src="dashboard.js"></script>
  <script src="clientes.js"></script>
  <script src="ctacte.js"></script>
  <script src="proveedores.js"></script>
  <script src="ingresos.js"></script>
  <script src="gastos.js"></script>
  <script src="historial.js"></script>
  <script src="login.js"></script>
  <script src="app.js"></script>
</body>
</html>
